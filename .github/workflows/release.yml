name: Release

# Triggers on RELEASE.* tags matching the same format as the libreFS server.
# Example: git tag RELEASE.2026-04-14T10-00-00Z && git push origin RELEASE.2026-04-14T10-00-00Z
on:
  push:
    tags:
      - 'RELEASE.*'

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # push to GHCR

jobs:
  # ── Build lc binary for each platform ────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: ''
          - goos: linux
            goarch: arm64
            asset_suffix: ''
          - goos: darwin
            goarch: amd64
            asset_suffix: ''
          - goos: darwin
            goarch: arm64
            asset_suffix: ''
          - goos: windows
            goarch: amd64
            asset_suffix: '.exe'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true

      - name: Build binary
        env:
          BINARY: lc-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.asset_suffix }}
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath --ldflags "-s -w" -o "$BINARY" .
          sha256sum "$BINARY" > "${BINARY}.sha256sum"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            lc-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.asset_suffix }}
            lc-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.asset_suffix }}.sha256sum
          retention-days: 1

  # ── Docker image ──────────────────────────────────────────────────────────
  docker:
    name: Docker image (linux/amd64 + linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/librefs/lc
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            lc-linux-amd64
            lc-linux-amd64.sha256sum
            lc-linux-arm64
            lc-linux-arm64.sha256sum
            lc-darwin-amd64
            lc-darwin-amd64.sha256sum
            lc-darwin-arm64
            lc-darwin-arm64.sha256sum
            lc-windows-amd64.exe
            lc-windows-amd64.exe.sha256sum
